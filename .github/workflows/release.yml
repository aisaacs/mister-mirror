name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Generate icon
        run: ./scripts/generate-icon.sh

      - name: Build DMG
        run: ./build-dmg.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/MisterMirror.dmg
          generate_release_notes: true
